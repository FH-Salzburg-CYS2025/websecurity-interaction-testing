name: Release Generated Artifacts

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  generate:
    name: Generate Exploits & Clusters
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      # Build a release binary without the heavy .cargo/config.toml flags
      # that require nightly or LLD — this job only needs a working binary.
      - name: Build release binary
        working-directory: xss_ca
        run: cargo build --release --target x86_64-unknown-linux-gnu
        env:
          CARGO_UNSTABLE_OPTIONS: ""
          RUSTFLAGS: ""

      - name: Install binary
        run: |
          install -m 0755 \
            xss_ca/target/x86_64-unknown-linux-gnu/release/xss_ca \
            /usr/local/bin/xss_ca

      # ── Translate ────────────────────────────────────────────────────────────
      # Run from inside generated_ca_csv/ so the tool writes its output to
      # generated_ca_csv/translated_exploits/ (parent-relative output path).
      - name: Translate covering-array CSVs
        working-directory: generated_ca_csv
        run: |
          xss_ca --translate \
            ca_scripttag_t2.csv \
            ca_scripttag_t3.csv \
            ca_eventhandler_t2.csv \
            ca_attributebreakout_t2.csv \
            ca_jscontext_t2.csv

      # ── Cluster ──────────────────────────────────────────────────────────────
      # Run from inside exploit_source/ so clusters land in
      # exploit_source/clusters/.  The tool skips files already listed in the
      # .processed manifest, so this is idempotent if the repo already contains
      # cluster outputs.
      - name: Cluster raw payload lists
        working-directory: exploit_source
        run: |
          xss_ca --cluster \
            xss-payloads.txt \
            XSS-BruteLogic.txt

      # ── Package ──────────────────────────────────────────────────────────────
      - name: Package generated artifacts
        run: |
          # Translated exploits
          zip -r \
            translated_exploits-${{ github.ref_name }}.zip \
            generated_ca_csv/translated_exploits/

          # Clustered payloads (exclude the .processed manifest)
          zip -r \
            payload_clusters-${{ github.ref_name }}.zip \
            exploit_source/clusters/ \
            --exclude "exploit_source/clusters/.processed"

      # ── Attach to release ────────────────────────────────────────────────────
      - name: Attach artifacts to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            translated_exploits-${{ github.ref_name }}.zip
            payload_clusters-${{ github.ref_name }}.zip
          body: |
            ### Generated artifacts for ${{ github.ref_name }}

            | File | Contents |
            |------|----------|
            | `translated_exploits-${{ github.ref_name }}.zip` | Concrete XSS payloads produced by translating each covering-array CSV |
            | `payload_clusters-${{ github.ref_name }}.zip` | Raw payloads grouped by injection-context cluster |

            Generated by `xss_ca --translate` and `xss_ca --cluster` at tag time.
          append_body: true
